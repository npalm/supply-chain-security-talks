name: Zizmor

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: zizmor-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Run zizmor audit
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required to read repository workflow files.
      actions: read # Required for action metadata resolution during audits.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: pedantic
          advanced-security: true
          inputs: .
