version: 2
updates:
  # Enable dependency updates for the Node.js/pnpm toolchain
  - package-ecosystem: "npm"
    # Look for `package.json` and `pnpm-lock.yaml` in the root directory
    directory: "/"
    # Check for dependency updates every weekday
    schedule:
      interval: "daily"
    commit-message:
      prefix: "dependencies"
      prefix-development: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
